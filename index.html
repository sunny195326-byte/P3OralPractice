<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口试练习 - 课室里的情景</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: #f0f4ff;
    color: #333;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #4f8cff 0%, #7c5cfc 100%);
    color: #fff;
    text-align: center;
    padding: 32px 16px 28px;
    box-shadow: 0 4px 20px rgba(79,140,255,0.3);
  }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
  .header .subtitle { margin-top: 8px; font-size: 15px; opacity: 0.85; }

  /* SECTION TITLES */
  .section-title {
    max-width: 960px;
    margin: 28px auto 18px;
    padding: 0 20px;
    font-size: 20px;
    font-weight: 700;
    color: #4f8cff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .icon { font-size: 24px; }

  /* PRACTICE BUTTONS GRID */
  .practice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 0 20px;
  }
  .practice-btn {
    background: #fff;
    border: 2px solid #e0e7ff;
    border-radius: 14px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    color: #4f8cff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .practice-btn:hover {
    background: linear-gradient(135deg, #4f8cff 0%, #7c5cfc 100%);
    color: #fff;
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(79,140,255,0.25);
  }
  .practice-btn .num {
    display: inline-flex;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #e0e7ff;
    color: #4f8cff;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .practice-btn:hover .num { background: rgba(255,255,255,0.25); color: #fff; }

  /* FANCY DIVIDER */
  .divider {
    max-width: 960px;
    margin: 10px auto 10px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, transparent, #b8c9ff 30%, #7c5cfc 50%, #b8c9ff 70%, transparent);
    border-radius: 2px;
  }
  .divider .diamond {
    width: 10px; height: 10px;
    background: linear-gradient(135deg, #4f8cff, #7c5cfc);
    transform: rotate(45deg);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* VOCAB GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 18px;
    max-width: 960px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(79,140,255,0.18);
  }
  .card .thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .card .label { padding: 10px 8px 12px; text-align: center; width: 100%; }
  .card .pinyin { font-size: 12px; color: #7c5cfc; font-weight: 500; letter-spacing: 0.5px; margin-bottom: 2px; }
  .card .hanzi { font-size: 20px; font-weight: 700; color: #222; }

  /* MODAL OVERLAY (shared) */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: #fff;
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.25s ease-out;
    position: relative;
  }
  .modal .close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.06);
    color: #555;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 10;
  }
  .modal .close-btn:hover { background: rgba(0,0,0,0.12); }
  .modal .modal-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    border-radius: 20px 20px 0 0;
  }
  .modal .modal-body { padding: 24px 24px 28px; text-align: center; }
  .modal .modal-pinyin { font-size: 18px; color: #7c5cfc; font-weight: 500; letter-spacing: 1.5px; margin-bottom: 4px; }
  .modal .modal-hanzi { font-size: 36px; font-weight: 800; color: #222; margin-bottom: 20px; }

  .play-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #4f8cff 0%, #7c5cfc 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 32px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(79,140,255,0.3);
  }
  .play-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(79,140,255,0.4); }
  .play-btn:active { transform: scale(0.97); }
  .play-btn .icon { font-size: 22px; }

  /* PRACTICE MODAL */
  .practice-modal {
    background: #fff;
    border-radius: 20px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.25s ease-out;
    position: relative;
  }
  .practice-modal .close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.06);
    color: #555;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 10;
  }
  .practice-modal .close-btn:hover { background: rgba(0,0,0,0.12); }
  .practice-modal .pm-header {
    background: linear-gradient(135deg, #4f8cff 0%, #7c5cfc 100%);
    color: #fff;
    padding: 24px 50px 24px 28px;
    border-radius: 20px 20px 0 0;
    font-size: 20px;
    font-weight: 700;
  }
  .practice-modal .pm-body {
    padding: 28px 28px 32px;
  }
  .practice-modal .sentence-block {
    font-size: 22px;
    line-height: 2.4;
    color: #222;
    margin-bottom: 24px;
  }
  .practice-modal .sentence-block ruby {
    ruby-align: center;
  }
  .practice-modal .sentence-block rt {
    font-size: 11px;
    color: #7c5cfc;
    font-weight: 500;
  }
  .practice-modal .pm-play-row {
    text-align: center;
  }

  /* ===== TAB SYSTEM ===== */
  .tab-section {
    max-width: 960px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }
  .big-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
  }
  .big-tab {
    flex: 1;
    padding: 16px 20px;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid #e0e7ff;
    background: #fff;
    color: #7c5cfc;
    transition: all 0.2s;
  }
  .big-tab:first-child { border-radius: 14px 0 0 0; border-right: none; }
  .big-tab:last-child { border-radius: 0 14px 0 0; }
  .big-tab.active {
    background: linear-gradient(135deg, #4f8cff 0%, #7c5cfc 100%);
    color: #fff;
    border-color: transparent;
  }
  .big-tab-content {
    display: none;
    background: #fff;
    border: 2px solid #e0e7ff;
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 0;
  }
  .big-tab-content.active { display: block; }

  .small-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #e0e7ff;
  }
  .small-tab {
    flex: 1;
    padding: 12px 10px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    color: #999;
    background: #f8f9ff;
    border-right: 1px solid #e0e7ff;
    transition: all 0.2s;
  }
  .small-tab:last-child { border-right: none; }
  .small-tab.active {
    color: #4f8cff;
    background: #fff;
    border-bottom: 3px solid #4f8cff;
    margin-bottom: -2px;
  }
  .small-tab-content {
    display: none;
    padding: 24px;
  }
  .small-tab-content.active { display: block; }

  .tab-text-block {
    font-size: 20px;
    line-height: 2.2;
    color: #222;
    margin-bottom: 20px;
  }
  .tab-text-block ruby { ruby-align: center; }
  .tab-text-block rt {
    font-size: 10px;
    color: #7c5cfc;
    font-weight: 500;
  }
  .tab-speaker-row { text-align: center; }
  .tab-speaker-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #4f8cff 0%, #7c5cfc 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(79,140,255,0.3);
  }
  .tab-speaker-btn:hover { transform: scale(1.05); }
  .tab-speaker-btn:active { transform: scale(0.97); }
  .tab-speaker-btn .icon { font-size: 20px; }

  /* FOOTER */
  .footer { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 14px; }
    .practice-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 14px; }
    .header h1 { font-size: 22px; }
    .card .hanzi { font-size: 17px; }
    .modal .modal-hanzi { font-size: 28px; }
    .practice-modal .sentence-block { font-size: 19px; line-height: 2.2; }
    .practice-modal .pm-body { padding: 20px 18px 24px; }
    .tab-text-block { font-size: 17px; line-height: 2; }
    .small-tab { font-size: 13px; padding: 10px 6px; }
    .big-tab { font-size: 16px; padding: 14px 10px; }
    .tab-section { padding: 0 14px; }
  }
</style>
</head>

/* Convert text to ruby HTML: each char gets pinyin on top */
function textToRuby(text, pinyinStr) {
  const pinyinParts = pinyinStr.split(/\s+/);
  const chars = [];
  for (const ch of text) {
    chars.push(ch);
  }
  /* Filter: only CJK chars get pinyin, punctuation stays plain */
  let pi = 0;
  let html = "";
  for (const ch of chars) {
    if (/[\u4e00-\u9fff]/.test(ch)) {
      const py = pi < pinyinParts.length ? pinyinParts[pi] : "";
      html += `<ruby>${ch}<rt>${py}</rt></ruby>`;
      pi++;
    } else {
      html += ch;
    }
  }
  return html;
}

function openPracticeModal(index) {
  const item = practiceItems[index];
  document.getElementById("pmHeader").textContent = item.label;

  /* Build ruby-annotated sentence */
  const rubyHtml = textToRuby(item.text, item.pinyin);
  document.getElementById("pmSentence").innerHTML = rubyHtml;

  practiceAudio = new Audio(item.audio);
  practiceOverlay.classList.add("active");
  document.body.style.overflow = "hidden";
}
function closePracticeModal() {
  practiceOverlay.classList.remove("active");
  document.body.style.overflow = "";
  if (practiceAudio) { practiceAudio.pause(); practiceAudio = null; }
}
document.getElementById("practicePlayBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  if (practiceAudio) { practiceAudio.currentTime = 0; practiceAudio.play(); }
});
practiceOverlay.addEventListener("click", (e) => { if (e.target === practiceOverlay) closePracticeModal(); });

/* ESC to close any modal */
document.addEventListener("keydown", (e) => {

});

/* Populate tab contents */
function buildTabContent(bigIdx, smallIdx) {
  const data = tabData[bigIdx][smallIdx];
  const el = document.getElementById(`st${bigIdx}_${smallIdx}`);
  const rubyHtml = textToRuby(data.text.replace(/\n/g, ""), data.pinyin);
  const displayHtml = data.text.replace(/\n\n/g, "<br><br>");
  /* Rebuild with line breaks preserved */
  const paragraphs = data.text.split("\n\n");
  let pinyinOffset = 0;
  const pinyinParts = data.pinyin.split(/\s+/);
  let fullHtml = "";
  for (const para of paragraphs) {
    const cleanPara = para.replace(/\n/g, "");
    let paraHtml = "";
    for (const ch of cleanPara) {
      if (/[\u4e00-\u9fff]/.test(ch)) {
        const py = pinyinOffset < pinyinParts.length ? pinyinParts[pinyinOffset] : "";
        paraHtml += `<ruby>${ch}<rt>${py}</rt></ruby>`;
        pinyinOffset++;
      } else {
        paraHtml += ch;
      }
    }
    fullHtml += paraHtml + "<br><br>";
  }

  el.innerHTML = `
    <div class="tab-text-block">${fullHtml}</div>
    <div class="tab-speaker-row">
      <button class="tab-speaker-btn" onclick="playTabAudio('${data.audio}')">
        <span class="icon">&#128266;</span><span>播放朗读</span>
      </button>
    </div>`;
}

for (let b = 0; b < 2; b++) {
  for (let s = 0; s < 3; s++) {
    buildTabContent(b, s);
  }
}

let tabAudioCurrent = null;
function playTabAudio(src) {
  if (tabAudioCurrent) { tabAudioCurrent.pause(); }
  tabAudioCurrent = new Audio(src);
  tabAudioCurrent.play();
}

function switchBigTab(idx) {
  document.querySelectorAll(".big-tab").forEach((t, i) => t.classList.toggle("active", i === idx));
  document.querySelectorAll(".big-tab-content").forEach((c, i) => c.classList.toggle("active", i === idx));
  if (tabAudioCurrent) { tabAudioCurrent.pause(); tabAudioCurrent = null; }
}

function switchSmallTab(bigIdx, smallIdx) {
  const container = document.getElementById(`bigTab${bigIdx}`);
  container.querySelectorAll(".small-tab").forEach((t, i) => t.classList.toggle("active", i === smallIdx));
  container.querySelectorAll(".small-tab-content").forEach((c, i) => c.classList.toggle("active", i === smallIdx));
  if (tabAudioCurrent) { tabAudioCurrent.pause(); tabAudioCurrent = null; }
}
